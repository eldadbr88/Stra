<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stra Markovic - NAVA Clinic</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            font-family: 'Montserrat', sans-serif;
        }

        .card {
            width: 380px;
            background: linear-gradient(160deg, #1a1a2e 0%, #0f0f1a 50%, #1a1a2e 100%);
            border-radius: 24px;
            padding: 40px 32px 32px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(191, 163, 107, 0.2);
            box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 40px rgba(191, 163, 107, 0.05);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #bfa36b, #d4b87a, #bfa36b, transparent);
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 36px;
        }

        .avatar-wrapper {
            position: relative;
            flex-shrink: 0;
        }

        .avatar-wrapper::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: linear-gradient(135deg, #bfa36b, #d4b87a, #bfa36b);
            z-index: 0;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            position: relative;
            z-index: 1;
            border: 3px solid #0f0f1a;
        }

        .profile-info {
            text-align: left;
        }

        .profile-name {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: #f0e6d3;
            line-height: 1.2;
            margin-bottom: 6px;
        }

        .profile-title {
            font-size: 13px;
            font-weight: 600;
            color: #bfa36b;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .profile-company {
            font-size: 12px;
            font-weight: 400;
            color: #8a8a9a;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(191, 163, 107, 0.3), transparent);
            margin-bottom: 28px;
        }

        .contact-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 36px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
            padding: 10px 14px;
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .contact-item:hover {
            background: rgba(191, 163, 107, 0.08);
            transform: translateX(4px);
        }

        .contact-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .contact-icon svg {
            width: 24px;
            height: 24px;
        }

        .contact-text {
            font-size: 14px;
            font-weight: 400;
            color: #d0d0d8;
            letter-spacing: 0.3px;
        }

        .save-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #bfa36b, #d4b87a);
            color: #0f0f1a;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(191, 163, 107, 0.3);
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(191, 163, 107, 0.4);
            background: linear-gradient(135deg, #d4b87a, #e0c88a);
        }

        .save-btn:active {
            transform: translateY(0);
        }

        .save-btn svg {
            width: 18px;
            height: 18px;
        }

        .whatsapp-icon { color: #25D366; }
        .gold-icon { color: #bfa36b; }
        .trustpilot-icon { color: #00b67a; }
    </style>
</head>
